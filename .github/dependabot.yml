version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    # Only update direct dependencies, not indirect/transitive ones
    allow:
      - dependency-type: "direct"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    # Only update Grafana packages — they drive the plugin SDK compatibility
    allow:
      - dependency-name: "@grafana/*"
